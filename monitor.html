<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿藤さん＆糸島さん トリビアバトル — モニター画面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;700;900&display=swap');
:root{--gold:#FFD700;--orange:#FF6B00;--dark:#0A0A1A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:#fff;font-family:'Noto Sans JP',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;}

/* ── TITLE ── */
#screen-title{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at center,#1a1040 0%,#0A0A1A 70%);position:relative;overflow:hidden;}
.title-content{display:flex;align-items:flex-start;gap:40px;margin-bottom:32px;}
.stars{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 15% 20%,#fff,transparent),radial-gradient(1px 1px at 75% 8%,#fff,transparent),radial-gradient(2px 2px at 50% 55%,rgba(255,215,0,.8),transparent),radial-gradient(1px 1px at 8% 78%,#fff,transparent),radial-gradient(1px 1px at 92% 65%,#fff,transparent),radial-gradient(1px 1px at 30% 40%,rgba(255,215,0,.5),transparent),radial-gradient(1px 1px at 60% 88%,#fff,transparent),radial-gradient(2px 2px at 85% 35%,rgba(255,215,0,.4),transparent),radial-gradient(1px 1px at 42% 12%,#fff,transparent);animation:twinkle 3s infinite alternate;}
@keyframes twinkle{0%{opacity:.5}100%{opacity:1}}
.title-badge{background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;font-weight:900;font-size:1.1rem;padding:6px 24px;border-radius:30px;margin-bottom:18px;letter-spacing:3px;animation:pulse-b 2s infinite;}
@keyframes pulse-b{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.4)}50%{box-shadow:0 0 50px rgba(255,215,0,.9)}}
.title-main{font-family:'Black Han Sans',sans-serif;font-size:clamp(2.8rem,6.5vw,5.5rem);text-align:center;line-height:1.15;background:linear-gradient(180deg,#FFD700 0%,#FF6B00 50%,#FF0000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,200,0,.8));margin-bottom:10px;}
.title-sub{font-size:1.3rem;color:rgba(255,255,255,.65);letter-spacing:4px;margin-bottom:40px;}
.qr-section{text-align:center;margin-bottom:24px;}
.qr-box{width:300px;height:300px;background:#fff;border-radius:16px;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(255,215,0,.3);}
.participants-list{display:flex;flex-direction:column;gap:8px;min-height:36px;max-height:70vh;overflow-y:auto;}
.participant-chip{background:rgba(255,215,0,.13);border:1px solid rgba(255,215,0,.4);color:var(--gold);padding:8px 22px;border-radius:24px;font-size:1.8rem;font-weight:700;animation:chipIn .3s ease;}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.start-btn{background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:1.4rem;padding:16px 56px;border-radius:50px;cursor:pointer;letter-spacing:4px;box-shadow:0 8px 40px rgba(255,165,0,.6);transition:all .2s;}
.start-btn:hover{transform:scale(1.05) translateY(-3px);}
.start-btn:active{transform:scale(.97);}

/* ── RULE ── */
#screen-rule{display:none;height:100vh;position:relative;cursor:pointer;background:#0A0A1A;}
#screen-rule img{width:100%;height:100%;object-fit:contain;object-position:center;}

/* ── QUESTION ── */
#screen-question{display:none;height:100vh;position:relative;overflow:hidden;}
.q-bg{position:absolute;inset:0;background:url('Select.jpg') center/cover no-repeat;}
.q-track{display:none;}
.q-number-badge{position:absolute;top:1%;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;font-weight:900;font-size:.95rem;padding:5px 22px;border-radius:30px;letter-spacing:3px;z-index:10;}
.question-text{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:34%;text-align:center;font-weight:900;font-size:clamp(1.4rem,2.5vw,2.4rem);line-height:1.3;text-shadow:2px 2px 0 #000;z-index:10;color:#333;padding:10px 16px;background:transparent;}
.choice-left{position:absolute;left:5%;top:30%;width:38%;height:25%;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;text-align:center;}
.choice-right{position:absolute;right:5%;top:30%;width:38%;height:25%;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;text-align:center;}
.choice-label{display:none;}
.choice-text{font-weight:900;font-size:clamp(2rem,3.8vw,3.8rem);text-shadow:2px 2px 4px rgba(0,0,0,.8),0 0 20px rgba(0,0,0,.5);line-height:1.2;color:#fff;}
.choice-arrow-l,.choice-arrow-r{display:none;}
.trolley-idle{display:none;}
.choice-names{position:absolute;bottom:5%;left:5%;right:5%;display:flex;flex-wrap:wrap;gap:5px;z-index:10;pointer-events:none;}
.choice-names-left{justify-content:flex-start;}
.choice-names-right{justify-content:flex-end;}
.choice-name-chip{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 16px;border-radius:18px;font-size:1.5rem;font-weight:700;animation:chipIn .3s ease;backdrop-filter:blur(4px);}
.answer-count{position:absolute;bottom:18px;right:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:9px 18px;font-size:1rem;z-index:10;}
.start-race-btn{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:1.25rem;padding:14px 46px;border-radius:50px;cursor:pointer;letter-spacing:3px;box-shadow:0 8px 40px rgba(255,165,0,.6);z-index:10;animation:pulse-b 2s infinite;transition:transform .1s;}
.start-race-btn:hover{transform:translateX(-50%) scale(1.05);}
.start-race-btn:active{transform:translateX(-50%) scale(.97);}

/* ── RACE ── */
#screen-race{display:none;height:100vh;position:relative;overflow:hidden;background:#000;}
#race-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.race-ui{position:absolute;inset:0;pointer-events:none;z-index:20;}
.race-timer-box{position:absolute;top:18px;left:50%;transform:translateX(-50%);text-align:center;}
.race-timer-num{font-family:'Black Han Sans',sans-serif;font-size:5.5rem;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.9),0 0 80px rgba(255,165,0,.5);animation:tpulse 1s ease-in-out infinite;display:block;}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.race-timer-label{color:rgba(255,215,0,.6);letter-spacing:4px;font-size:.85rem;font-weight:700;}
.race-accepting{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:2px solid var(--gold);border-radius:50px;padding:10px 32px;font-weight:900;font-size:1rem;color:var(--gold);letter-spacing:2px;animation:pulse-b 1.5s infinite;white-space:nowrap;}
.race-ans-count{position:absolute;bottom:82px;right:20px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px 16px;font-size:.9rem;}

/* ── ANSWER JUDGE ── */
#screen-answer{display:none;height:100vh;position:relative;overflow:hidden;background:#0A0A1A;}
.answer-left{position:absolute;left:0;top:0;width:50%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#081a6e,#1540b8);border-right:4px solid rgba(255,255,255,.08);transition:all .5s;}
.answer-right{position:absolute;right:0;top:0;width:50%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(225deg,#6e0808,#b81515);transition:all .5s;}
.answer-choice-label{font-size:1.1rem;opacity:.65;letter-spacing:3px;margin-bottom:14px;}
.answer-choice-text{font-size:clamp(2.4rem,4.8vw,5rem);font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.5);}
.answer-btn{margin-top:28px;background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.5);color:#fff;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:1rem;padding:12px 32px;border-radius:50px;cursor:pointer;letter-spacing:2px;transition:all .2s;backdrop-filter:blur(4px);}
.answer-btn:hover{background:rgba(255,255,255,.32);transform:scale(1.06);}
.answer-divider{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;}
.vs-text{font-family:'Black Han Sans',sans-serif;font-size:2.8rem;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.8);display:block;margin-bottom:8px;}
.instruction-text{background:rgba(0,0,0,.75);border:2px solid var(--gold);border-radius:12px;padding:10px 22px;font-size:.85rem;color:var(--gold);letter-spacing:1px;white-space:nowrap;line-height:1.6;}
.correct-flash{animation:c-flash .8s ease forwards;}
.wrong-dim{animation:w-dim .8s ease forwards;}
@keyframes c-flash{0%{filter:brightness(1)}30%{filter:brightness(3)}100%{filter:brightness(1.5);box-shadow:inset 0 0 120px rgba(255,215,0,.4)}}
@keyframes w-dim{0%{filter:brightness(1)}100%{filter:brightness(.25) grayscale(1)}}
.score-display{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;font-weight:900;font-size:1.4rem;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.6);}
.next-btn{position:absolute;bottom:28px;right:28px;background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:1rem;padding:13px 38px;border-radius:50px;cursor:pointer;letter-spacing:2px;z-index:30;box-shadow:0 6px 30px rgba(255,165,0,.5);display:none;transition:all .2s;}
.next-btn:hover{transform:scale(1.05);}

/* ── COMPLETE ── */
#screen-complete{display:none;height:100vh;background:radial-gradient(ellipse at center,#1a0a40 0%,#0A0A1A 70%);position:relative;overflow:hidden;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.firework{position:absolute;width:10px;height:10px;border-radius:50%;animation:fw 1.5s ease-out forwards;}
@keyframes fw{0%{transform:scale(0);opacity:1}50%{transform:scale(3);opacity:.8}100%{transform:scale(8);opacity:0}}
.confetti-piece{position:absolute;opacity:0;animation:cf linear forwards;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.complete-star{font-size:3.5rem;animation:spin-s 3s linear infinite;display:block;margin-bottom:16px;}
@keyframes spin-s{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.3)}100%{transform:rotate(360deg) scale(1)}}
.complete-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(3rem,8vw,7rem);background:linear-gradient(180deg,#FFD700 0%,#FF6B00 50%,#FF0000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(255,200,0,.9));line-height:1.1;margin-bottom:14px;}
.complete-sub{font-size:1.4rem;color:rgba(255,255,255,.75);letter-spacing:3px;margin-bottom:36px;}
.perfect-names{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:44px;}
.perfect-chip{background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,107,0,.18));border:2px solid var(--gold);color:var(--gold);padding:10px 22px;border-radius:30px;font-size:1.1rem;font-weight:700;animation:ng 2s infinite alternate;}
@keyframes ng{0%{box-shadow:0 0 10px rgba(255,215,0,.2)}100%{box-shadow:0 0 30px rgba(255,215,0,.7)}}
.restart-btn{background:linear-gradient(135deg,#FFD700,#FF6B00);color:#000;border:none;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:1.1rem;padding:14px 46px;border-radius:50px;cursor:pointer;letter-spacing:3px;box-shadow:0 8px 40px rgba(255,165,0,.5);transition:all .2s;}
.restart-btn:hover{transform:scale(1.05);}

/* ── SPLASH ── */
#screen-splash{position:fixed;inset:0;z-index:9999;background:#1a0a00;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;}
#screen-splash img{width:100%;height:100%;object-fit:contain;object-position:center;background:#1a0a00;}
.splash-fallback{display:none;text-align:center;padding:40px;}
.splash-fallback-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(2.5rem,7vw,5rem);background:linear-gradient(180deg,#FFD700 0%,#FF6B00 50%,#FF0000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:20px;}
.splash-fallback-sub{font-size:1.2rem;color:rgba(255,255,255,.6);letter-spacing:3px;margin-bottom:40px;}
.splash-start-btn{background:radial-gradient(circle,#dd2222,#990000);color:#fff;font-weight:900;font-size:1.6rem;padding:20px 60px;border-radius:50px;border:4px solid rgba(255,255,255,.3);box-shadow:0 10px 40px rgba(200,0,0,.7);letter-spacing:6px;cursor:pointer;animation:splash-pulse 2s infinite;}
@keyframes splash-pulse{0%,100%{box-shadow:0 10px 40px rgba(200,0,0,.6);transform:scale(1)}50%{box-shadow:0 10px 60px rgba(200,0,0,.9);transform:scale(1.05)}}
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

<!-- SPLASH -->
<div id="screen-splash" onclick="exitSplash()">
  <img src="splash.jpg" alt="トロッコ・アドベンチャー" onerror="this.style.display='none';document.querySelector('.splash-fallback').style.display='flex';">
  <div class="splash-fallback" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;background:radial-gradient(ellipse at center,#2a1a00 0%,#1a0a00 70%);">
    <div class="splash-fallback-title">阿藤＆糸島 感謝会記念<br>トロッコ・アドベンチャー</div>
    <div class="splash-fallback-sub">— TROLLEY ADVENTURE —</div>
    <button class="splash-start-btn" onclick="exitSplash();event.stopPropagation();">START</button>
  </div>
</div>

<!-- TITLE -->
<div id="screen-title" style="display:none;">
  <div class="stars"></div>
  <div class="title-content">
    <div class="qr-section">
      <div class="qr-box" id="qr-box"></div>
    </div>
    <div class="participants-list" id="participants-list">
      <span style="color:rgba(255,255,255,.35);font-size:.85rem;">参加者が接続すると<br>表示されます</span>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">▶ ゲームスタート</button>
</div>

<!-- RULE -->
<div id="screen-rule" onclick="startFirstQuestion()">
  <img src="Rule.png" alt="ルール説明">
</div>

<!-- QUESTION -->
<div id="screen-question">
  <div class="q-bg"></div>
  <div class="q-track"></div>
  <div class="q-number-badge" id="q-number-badge">第1問 / 全6問</div>
  <div class="question-text" id="question-text">問題文</div>
  <div class="choice-left">
    <div class="choice-text" id="choice-left-text">左</div>
  </div>
  <div class="choice-right">
    <div class="choice-text" id="choice-right-text">右</div>
  </div>
  <div class="choice-names choice-names-left" id="choice-left-names" style="right:auto;width:45%;"></div>
  <div class="choice-names choice-names-right" id="choice-right-names" style="left:auto;width:45%;right:5%;"></div>
  <div class="answer-count" id="answer-count">📱 0人 回答済み</div>
  <button class="start-race-btn" onclick="startRace()">🚀 トロッコ　スタート！</button>
</div>

<!-- RACE -->
<div id="screen-race">
  <video id="race-video" playsinline preload="auto" src="トロッコ動画.mp4"></video>
  <div class="race-ui">
    <div class="race-timer-box">
      <span class="race-timer-num" id="race-timer-num">10</span>
      <div class="race-timer-label">SECONDS</div>
    </div>
    <div class="race-accepting">📱 まだ回答できます！ 左か右を選ぼう</div>
    <div class="race-ans-count" id="race-ans-count">📱 0人 回答済み</div>
  </div>
</div>

<!-- ANSWER JUDGE -->
<div id="screen-answer">
  <div class="answer-left" id="answer-left-panel">
    <div class="answer-choice-label">◀ ひだり</div>
    <div class="answer-choice-text" id="answer-left-text">左</div>
    <button class="answer-btn" onclick="judgeAnswer('left')" id="btn-judge-left">✅ これが正解！</button>
  </div>
  <div class="answer-right" id="answer-right-panel">
    <div class="answer-choice-label">みぎ ▶</div>
    <div class="answer-choice-text" id="answer-right-text">右</div>
    <button class="answer-btn" onclick="judgeAnswer('right')" id="btn-judge-right">✅ これが正解！</button>
  </div>
  <div class="answer-divider">
    <span class="vs-text">VS</span>
    <div class="instruction-text">阿藤さん・糸島さんの発表を聞いて<br>正解の方を選んでください</div>
  </div>
  <div class="score-display" id="score-display"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
</div>

<!-- COMPLETE -->
<div id="screen-complete">
  <span class="complete-star">⭐</span>
  <div class="complete-title">全問正解<br>コンプリート！</div>
  <div class="complete-sub">🏆 PERFECT SCORE 🏆</div>
  <div class="perfect-names" id="perfect-names"></div>
  <button class="restart-btn" onclick="restartGame()">🔄 もう一度遊ぶ</button>
</div>

<script>
// ══════════════════════════════════════════
//  GAME DATA
// ══════════════════════════════════════════
const QUESTIONS=[
  {id:1,question:"阿藤さんの出身は？",left:"沖縄",right:"千葉",answer:"left"},
  {id:2,question:"糸島さんの高校時代は？",left:"女子校",right:"普通校",answer:"right"},
  {id:3,question:"阿藤さんの趣味は？",left:"釣り",right:"ゴルフ",answer:"right"},
  {id:4,question:"糸島さんが好きな食べ物は？",left:"ラーメン",right:"寿司",answer:"left"},
  {id:5,question:"阿藤さんが社会人になって最初に買ったものは？",left:"バイク",right:"パソコン",answer:"left"},
  {id:6,question:"糸島さんの特技は？",left:"料理",right:"ダンス",answer:"right"}
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentQ=0, participants={}, answeredCount=0;
let raceAccepting=false;  // ★ トロッコ中も回答受付フラグ
let raceTimerInterval=null, countdownVal=10;
let gameChannel=null;

try{ gameChannel=new BroadcastChannel('trivia-battle'); gameChannel.onmessage=e=>handleMsg(e.data); }catch(e){}

// ══════════════════════════════════════════
//  PeerJS — クロスデバイス通信
// ══════════════════════════════════════════
let peerInstance=null, playerConns={};
const roomId=Math.random().toString(36).substr(2,6).toUpperCase();

function initPeer(){
  try{
    peerInstance=new Peer('trolley-'+roomId);
    peerInstance.on('open',()=>{ console.log('PeerJS ready, room:',roomId); generateQR(); });
    peerInstance.on('connection',(conn)=>{
      conn.on('open',()=>{ playerConns[conn.peer]=conn; });
      conn.on('data',(data)=>{ handleMsg(data); });
      conn.on('close',()=>{ delete playerConns[conn.peer]; });
    });
    peerInstance.on('error',(err)=>{ console.warn('PeerJS error:',err); generateQR(); });
  }catch(e){ console.warn('PeerJS unavailable:',e); generateQR(); }
}

function generateQR(){
  const baseUrl='https://furuta-ideas.github.io/trolley_adventure_game/player.html';
  const url=baseUrl+'?room='+roomId;
  try{
    const qr=qrcode(0,'M'); qr.addData(url); qr.make();
    const box=document.getElementById('qr-box');
    box.innerHTML=qr.createImgTag(6,0);
    const img=box.querySelector('img');
    if(img) img.style.cssText='width:270px;height:270px;image-rendering:pixelated;';
  }catch(e){ console.warn('QR generation failed:',e); }
}

function sendToPlayers(d){
  try{if(gameChannel)gameChannel.postMessage(d);}catch(e){}
  try{localStorage.setItem('trivia-state',JSON.stringify({...d,ts:Date.now()}));}catch(e){}
  // PeerJS broadcast to all connected players
  Object.values(playerConns).forEach(conn=>{
    try{conn.send(d);}catch(e){}
  });
}

function handleMsg(d){
  if(d.type==='join'){
    participants[d.id]={name:d.name,answers:Array(QUESTIONS.length).fill(null)};
    updateChips(); updateAnswerCount();
  }
  if(d.type==='answer'){
    // ★ question画面中 OR raceAccepting中のみ受け付け
    const qVisible=document.getElementById('screen-question').style.display!=='none';
    if((qVisible||raceAccepting)&&participants[d.id]){
      participants[d.id].answers[currentQ]=d.choice;
      updateAnswerCount();
    }
  }
}

function updateChips(){
  const list=document.getElementById('participants-list');
  const names=Object.values(participants).map(p=>p.name);
  list.innerHTML=names.length===0
    ?'<span style="color:rgba(255,255,255,.35);font-size:.85rem;">参加者が接続すると表示されます</span>'
    :names.map(n=>`<span class="participant-chip">👤 ${n}</span>`).join('');
}
function updateAnswerCount(){
  const total=Object.keys(participants).length;
  answeredCount=Object.values(participants).filter(p=>p.answers[currentQ]!==null).length;
  const txt=`📱 ${answeredCount} / ${total}人 回答済み`;
  document.getElementById('answer-count').textContent=txt;
  document.getElementById('race-ans-count').textContent=txt;
  updateChoiceNames();
}
function updateChoiceNames(){
  const leftNames=[],rightNames=[];
  Object.values(participants).forEach(p=>{
    if(p.answers[currentQ]==='left') leftNames.push(p.name);
    else if(p.answers[currentQ]==='right') rightNames.push(p.name);
  });
  document.getElementById('choice-left-names').innerHTML=leftNames.map(n=>`<span class="choice-name-chip">${n}</span>`).join('');
  document.getElementById('choice-right-names').innerHTML=rightNames.map(n=>`<span class="choice-name-chip">${n}</span>`).join('');
}

// ══════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════
function showScreen(name){
  ['splash','title','rule','question','race','answer','complete'].forEach(s=>{
    const el=document.getElementById('screen-'+s);
    if(el) el.style.display='none';
  });
  const el=document.getElementById('screen-'+name);
  if(!el)return;
  const flexScreens=['splash','title','complete'];
  el.style.display=flexScreens.includes(name)?'flex':'block';
}

function exitSplash(){
  showScreen('title');
}

// ══════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════
function startGame(){
  // 参加者リストを保持しつつ全状態を初期化
  const savedParticipants = {...participants};
  initAllState();
  participants = savedParticipants;
  Object.values(participants).forEach(p=>{ p.answers=Array(QUESTIONS.length).fill(null); });

  sendToPlayers({type:'game_init'}); // player側キャッシュ上書き

  showScreen('rule');
}

function startFirstQuestion(){
  loadQuestion();
  showScreen('question');
  sendToPlayers({type:'question',q:currentQ,left:QUESTIONS[currentQ].left,right:QUESTIONS[currentQ].right});
  playBGM('ambient');
}

function loadQuestion(){
  const q=QUESTIONS[currentQ];
  raceAccepting=false;
  document.getElementById('q-number-badge').textContent=`第${currentQ+1}問 / 全${QUESTIONS.length}問`;
  document.getElementById('question-text').textContent=q.question;
  document.getElementById('choice-left-text').textContent=q.left;
  document.getElementById('choice-right-text').textContent=q.right;
  document.getElementById('answer-left-text').textContent=q.left;
  document.getElementById('answer-right-text').textContent=q.right;
  answeredCount=0;
  document.getElementById('answer-count').textContent='📱 0人 回答済み';
  document.getElementById('race-ans-count').textContent='📱 0人 回答済み';
  document.getElementById('choice-left-names').innerHTML='';
  document.getElementById('choice-right-names').innerHTML='';

  // アニメーションクラスを完全除去（前問の残骸）
  const lp=document.getElementById('answer-left-panel');
  const rp=document.getElementById('answer-right-panel');
  // クラス付け替えでアニメ強制リセット
  lp.className=''; rp.className='';
  void lp.offsetWidth; void rp.offsetWidth; // reflow trigger
  lp.className='answer-left';
  rp.className='answer-right';

  document.getElementById('btn-judge-left').style.display='';
  document.getElementById('btn-judge-right').style.display='';
  document.getElementById('score-display').textContent='';
  document.getElementById('next-btn').style.display='none';
}

function startRace(){
  if(raceTimerInterval){ clearInterval(raceTimerInterval); raceTimerInterval=null; }

  raceAccepting=true;
  showScreen('race');

  // 動画を再生（音声付き）
  const video=document.getElementById('race-video');
  video.currentTime=0;
  video.muted=false;
  video.play().catch(()=>{
    // 自動再生制限時はミュートで開始→すぐにアンミュート
    video.muted=true;
    video.play().then(()=>{ video.muted=false; }).catch(e=>console.warn('Video play failed:',e));
  });

  sendToPlayers({type:'race_start'});

  countdownVal=10;
  document.getElementById('race-timer-num').textContent=countdownVal;

  raceTimerInterval=setInterval(()=>{
    countdownVal--;
    document.getElementById('race-timer-num').textContent=countdownVal;
    if(countdownVal<=0){
      clearInterval(raceTimerInterval); raceTimerInterval=null;
      raceAccepting=false;
      // 動画を停止
      const v=document.getElementById('race-video');
      v.pause();
      stopBGM();
      playSound('brake');
      setTimeout(()=>showScreen('answer'),700);
    }
  },1000);
}

function judgeAnswer(side){
  const correct=side;
  if(correct==='left'){
    document.getElementById('answer-left-panel').classList.add('correct-flash');
    document.getElementById('answer-right-panel').classList.add('wrong-dim');
  }else{
    document.getElementById('answer-right-panel').classList.add('correct-flash');
    document.getElementById('answer-left-panel').classList.add('wrong-dim');
  }
  document.getElementById('btn-judge-left').style.display='none';
  document.getElementById('btn-judge-right').style.display='none';
  const correctPlayers=Object.values(participants).filter(p=>p.answers[currentQ]===correct);
  const total=Object.keys(participants).length;
  document.getElementById('score-display').textContent=`🎯 ${correctPlayers.length} / ${total} 人正解！`;
  sendToPlayers({type:'result',correct,q:currentQ});
  playSound('result');
  setTimeout(()=>document.getElementById('next-btn').style.display='block',1500);
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=QUESTIONS.length){showComplete();return;}
  loadQuestion();
  showScreen('question');
  sendToPlayers({type:'question',q:currentQ,left:QUESTIONS[currentQ].left,right:QUESTIONS[currentQ].right});
}

function showComplete(){
  showScreen('complete');
  playBGM('fanfare');
  spawnConfetti(); spawnFireworks();
  const perfects=Object.entries(participants)
    .filter(([,p])=>p.answers.every((a,i)=>a===QUESTIONS[i].answer))
    .map(([,p])=>p.name);
  const el=document.getElementById('perfect-names');
  el.innerHTML=perfects.length>0
    ?perfects.map(n=>`<span class="perfect-chip">⭐ ${n}</span>`).join('')
    :'<span style="color:rgba(255,255,255,.45)">今回は全問正解者なし…次回チャレンジしよう！</span>';
  sendToPlayers({type:'complete'});
}

function restartGame(){
  initAllState();
  updateChips();
  showScreen('title');
}

function initAllState(){
  // ── タイマー・アニメーション完全停止
  if(raceTimerInterval){ clearInterval(raceTimerInterval); raceTimerInterval=null; }
  stopBGM();

  // ── ゲーム変数リセット
  currentQ=0;
  answeredCount=0;
  raceAccepting=false;
  countdownVal=10;
  participants={};

  // ── 動画リセット
  const video=document.getElementById('race-video');
  if(video){ video.pause(); video.currentTime=0; }

  // ── DOM リセット（アニメーションクラス等）
  const lp=document.getElementById('answer-left-panel');
  const rp=document.getElementById('answer-right-panel');
  if(lp){ lp.className='answer-left'; lp.style.cssText=''; }
  if(rp){ rp.className='answer-right'; rp.style.cssText=''; }
  const bjl=document.getElementById('btn-judge-left');
  const bjr=document.getElementById('btn-judge-right');
  if(bjl) bjl.style.display='';
  if(bjr) bjr.style.display='';
  const sd=document.getElementById('score-display');
  if(sd) sd.textContent='';
  const nb=document.getElementById('next-btn');
  if(nb) nb.style.display='none';
  document.getElementById('answer-count').textContent='📱 0人 回答済み';
  document.getElementById('race-ans-count').textContent='📱 0人 回答済み';
  document.getElementById('race-timer-num').textContent='10';

  // コンプリート画面の confetti/fireworks 残骸を除去
  document.getElementById('screen-complete').querySelectorAll('.confetti-piece,.firework').forEach(e=>e.remove());

  // ── localStorage クリア（player側の誤作動防止）
  try{ localStorage.removeItem('trivia-state'); }catch(e){}
}


// ══════════════════════════════════════════
//  CONFETTI / FIREWORKS
// ══════════════════════════════════════════
function spawnConfetti(){
  const cols=['#FFD700','#FF6B00','#FF3366','#00CCFF','#00FF88','#FF00CC'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${8+Math.random()*12}px;height:${12+Math.random()*16}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;`;
      document.getElementById('screen-complete').appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*50);
  }
}
function spawnFireworks(){
  const cols=['#FFD700','#FF3366','#00CCFF','#00FF88'];
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='firework';
      const c=cols[Math.floor(Math.random()*cols.length)];
      el.style.cssText=`left:${15+Math.random()*70}vw;top:${10+Math.random()*60}vh;background:${c};box-shadow:0 0 20px 10px ${c};`;
      document.getElementById('screen-complete').appendChild(el);
      setTimeout(()=>el.remove(),1500);
    },i*250);
  }
}

// ══════════════════════════════════════════
//  AUDIO (Web Audio API)
// ══════════════════════════════════════════
let audioCtx=null, bgmNode=null, bgmGain=null;
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playBGM(type){
  stopBGM();
  const ctx=getACtx();
  bgmGain=ctx.createGain(); bgmGain.connect(ctx.destination);

  if(type==='race'){
    bgmGain.gain.setValueAtTime(.28,ctx.currentTime);
    const scale=[220,247,294,330,370,440,494,523,587,659,698,784];
    let t=ctx.currentTime;
    const loop=()=>{
      const bar=.125;
      for(let i=0;i<32;i++){
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g); g.connect(bgmGain);
        osc.frequency.value=scale[(i*3)%12]*(i%16<8?1:2);
        osc.type=(i%4===0)?'sawtooth':'square';
        g.gain.setValueAtTime(0,t+i*bar);
        g.gain.linearRampToValueAtTime(i%4===0?.5:.28,t+i*bar+.012);
        g.gain.linearRampToValueAtTime(0,t+i*bar+bar*.82);
        osc.start(t+i*bar); osc.stop(t+i*bar+bar);
        if(i%4===0){
          const p=ctx.createOscillator(),pg=ctx.createGain();
          p.connect(pg); pg.connect(bgmGain);
          p.type='square'; p.frequency.value=55;
          pg.gain.setValueAtTime(.55,t+i*bar);
          pg.gain.linearRampToValueAtTime(0,t+i*bar+.09);
          p.start(t+i*bar); p.stop(t+i*bar+.1);
        }
      }
    };
    loop(); bgmNode=setInterval(()=>{t=ctx.currentTime;loop();},32*.125*1000);
  }

  if(type==='fanfare'){
    bgmGain.gain.setValueAtTime(.4,ctx.currentTime);
    [523,659,784,1047,784,659,523,392,523,659,784,1047,784,1047,1175,1047].forEach((f,i)=>{
      ['triangle','sawtooth'].forEach((tp,ti)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g); g.connect(bgmGain);
        o.type=tp; o.frequency.value=f*(ti===1?.5:1);
        g.gain.setValueAtTime(0,ctx.currentTime+i*.17);
        g.gain.linearRampToValueAtTime(ti===0?.45:.15,ctx.currentTime+i*.17+.04);
        g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.17+.16);
        o.start(ctx.currentTime+i*.17); o.stop(ctx.currentTime+i*.17+.18);
      });
    });
  }

  if(type==='ambient'){
    bgmGain.gain.setValueAtTime(.06,ctx.currentTime);
    const play=()=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(bgmGain); o.type='sine'; o.frequency.value=220;
      g.gain.setValueAtTime(.1,ctx.currentTime); g.gain.linearRampToValueAtTime(0,ctx.currentTime+1.8);
      o.start(ctx.currentTime); o.stop(ctx.currentTime+1.8);
    };
    play(); bgmNode=setInterval(play,2200);
  }
}

function stopBGM(){
  if(bgmNode){clearInterval(bgmNode);bgmNode=null;}
  if(bgmGain){try{bgmGain.disconnect();}catch(e){}bgmGain=null;}
}

function playSound(type){
  const ctx=getACtx(),g=ctx.createGain(); g.connect(ctx.destination);
  if(type==='brake'){
    [900,450,200,80].forEach((f,i)=>{
      const o=ctx.createOscillator(),og=ctx.createGain();
      o.connect(og); og.connect(g); o.type='sawtooth'; o.frequency.value=f;
      og.gain.setValueAtTime(0,ctx.currentTime+i*.14);
      og.gain.linearRampToValueAtTime(.35,ctx.currentTime+i*.14+.015);
      og.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.14+.18);
      o.start(ctx.currentTime+i*.14); o.stop(ctx.currentTime+i*.14+.2);
    });
  }
  if(type==='result'){
    [523,659,784,1047,1319].forEach((f,i)=>{
      const o=ctx.createOscillator(),og=ctx.createGain();
      o.connect(og); og.connect(g); o.type='triangle'; o.frequency.value=f;
      og.gain.setValueAtTime(0,ctx.currentTime+i*.13);
      og.gain.linearRampToValueAtTime(.42,ctx.currentTime+i*.13+.04);
      og.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.13+.28);
      o.start(ctx.currentTime+i*.13); o.stop(ctx.currentTime+i*.13+.3);
    });
    const b=ctx.createOscillator(),bg=ctx.createGain();
    b.connect(bg); bg.connect(g); b.type='square'; b.frequency.value=130;
    bg.gain.setValueAtTime(.18,ctx.currentTime+.7);
    bg.gain.linearRampToValueAtTime(0,ctx.currentTime+1.15);
    b.start(ctx.currentTime+.7); b.stop(ctx.currentTime+1.2);
  }
}

window.onload=()=>{
  // 起動時に前回セッションのキャッシュを完全クリア
  try{ localStorage.removeItem('trivia-state'); }catch(e){}
  showScreen('splash');
  // PeerJS接続とQRコード生成をバックグラウンドで開始
  initPeer();
};
